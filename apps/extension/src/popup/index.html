<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Premon</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <style>
      html, body { margin: 0; padding: 0; }
      /* Toolbar action popup: fixed size so Chrome sizes the popup to it.
         !important is required — the bundled Tailwind base rule
         (html,body,#root{height:100%}) is flattened to a plain unlayered
         rule that loads (via the CSS <link>) AFTER this inline block, so by
         source order it would otherwise win and force height:100%. In a real
         popup that resolves against an undefined viewport and collapses the
         popup to a tiny, cramped box. */
      html, body { width: 400px !important; height: 600px !important; }
      /* Standalone sign/connect window (opened via windows.create with
         ?window=1): fill the whole OS window so the UI isn't a small box
         floating inside a larger frame. The class is toggled in main.tsx —
         the page CSP forbids inline scripts. */
      html.in-window, html.in-window body { width: 100% !important; height: 100% !important; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
