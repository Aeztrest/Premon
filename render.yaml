# Render Blueprint — Premon backend (apps/server, Fastify analyzer API).
# Usage: render.com → New → Blueprint → pick this repo. Render reads this file.
# Free plan sleeps after 15 min idle; first request then cold-starts in ~30 s.
services:
  - type: web
    name: premon-api
    runtime: node
    plan: free
    region: frankfurt
    # Render injects PORT; the server reads it (apps/server/src/config/index.ts).
    # --prod=false is required so pnpm installs devDeps (typescript, @types/node)
    # — otherwise the tsc build fails. Build @premon/guard before @premon/server
    # because the server imports it as a workspace dependency (resolves to dist).
    buildCommand: corepack enable && corepack prepare pnpm@10.33.2 --activate && pnpm install --frozen-lockfile --prod=false && pnpm --filter @premon/guard build && pnpm --filter @premon/server build
    startCommand: node apps/server/dist/index.js
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NODE_ENV
        value: production
      - key: LOG_LEVEL
        value: info
      - key: MONAD_NETWORK
        value: testnet
      # Required — without a valid URL the server refuses to start (zod .url()).
      - key: MONAD_RPC_URL
        value: https://testnet-rpc.monad.xyz
      # Real client IP + rate limiting behind Render's proxy.
      - key: DELTAG_TRUST_PROXY
        value: "true"
      # The showcase/wallet send "dev-key-change-me" by default; match it so the
      # public demo works out of the box. Change here + in the frontend env to lock down.
      - key: DELTAG_API_KEYS
        value: dev-key-change-me
      # Allow the Vercel-hosted wallet (separate origin) to call the API.
      - key: CORS_ALLOW_ORIGIN
        value: "*"
      # x402 payment gate off for the free demo.
      - key: X402_ENABLED
        value: "false"
      # Set to the real Monad testnet USDC before relying on token metadata / x402.
      # - key: MONAD_USDC_ADDRESS
      #   value: "0x..."
